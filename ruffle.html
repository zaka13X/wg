<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Ruffle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        #controls {
            margin-bottom: 20px;
            padding: 10px;
            background: #333;
            border-radius: 8px;
            display: inline-block;
        }
        #ruffle-container {
            width: 800px;
            height: 600px;
            margin: 0 auto;
            border: 2px solid #555;
            background: #000;
        }
    </style>
</head>
<body>

    <div id="controls">
        <label for="swf-upload">Select SWF File:</label>
        <input type="file" id="swf-upload" accept=".swf">
    </div>

    <div id="ruffle-container"></div>

    <!-- Load the latest Ruffle script directly -->
    <script src="https://gcore.jsdelivr.net/npm/@ruffle-rs/ruffle@0.3.0/ruffle.js"></script>

    <script>
        let ruffle = null;
        let player = null;

        // Initialize Ruffle
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            ruffle = window.RufflePlayer.newest();
            player = ruffle.createPlayer();
            document.getElementById("ruffle-container").appendChild(player);
        });

        // Handle file upload
        document.getElementById("swf-upload").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                // Convert the file into a temporary object URL for Ruffle to read
                const fileUrl = URL.createObjectURL(file);
                if (player) {
                    player.load(fileUrl);
                }
            }
        });
    </script>
</body>
</html>
